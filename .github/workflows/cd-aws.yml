name: CD - Deploy to ECS Fargate (tag) - AWS

on:
  push:
    tags:
      - "aws-v*"   # AWS production releases must use aws-v* to avoid cross-cloud tag collisions
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

jobs:
  smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install (for tests)
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[api,dev]"

      - name: Run smoke tests
        run: pytest -m smoke -q

  deploy:
    environment: production-aws
    needs: [smoke]
    runs-on: ubuntu-latest
    env:
      AWS_REGION: ${{ vars.AWS_REGION }}
      ECR_REPOSITORY: ${{ vars.ECR_REPOSITORY }}
      ECS_CLUSTER: ${{ vars.ECS_CLUSTER_PROD }}
      ECS_SERVICE: ${{ vars.ECS_SERVICE_PROD }}
      ECS_TASK_DEFINITION: ${{ vars.ECS_TASK_DEFINITION_PROD }}
      CONTAINER_NAME: ${{ vars.CONTAINER_NAME }}
      MODEL_REGISTRY_URI: ${{ vars.MODEL_REGISTRY_URI }}

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_IAM_ROLE_ARN_PROD }}
          aws-region: ${{ env.AWS_REGION }}

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[api]"

      # Read promoted URI from S3 (equivalent of `gcloud storage cat` from GCS)
      - name: Read promoted model URI from S3
        shell: bash
        run: |
          set -euo pipefail

          python - <<PY
          import boto3, os, sys

          uri = os.environ["MODEL_REGISTRY_URI"].rstrip("/")
          rest = uri[5:]
          bucket, _, prefix = rest.partition("/")
          key = f"{prefix}/promoted/latest_uri.txt" if prefix else "promoted/latest_uri.txt"
        
          from botocore.exceptions import ClientError
          try:
              resp = boto3.client("s3").get_object(Bucket=bucket, Key=key)
              promoted_uri = resp["Body"].read().decode().strip()
          except ClientError as e:
              if e.response["Error"]["Code"] in ("NoSuchKey", "404"):
                  print("ERROR: No promoted model URI found. Run retrain workflow first.")
                  sys.exit(1)
              raise

          if not promoted_uri:
              print("ERROR: Promoted URI is empty.")
              sys.exit(1)

          print(f"Promoting model: {promoted_uri}")
          with open(os.environ["GITHUB_ENV"], "a") as f:
              f.write(f"ARTIFACTS_URI={promoted_uri}\n")
          PY

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and Push image to ECR
        shell: bash
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
        run: |
          set -euo pipefail
          TAG="${GITHUB_REF_NAME}"  # e.g. v0.2.0
          IMAGE_URI="${ECR_REGISTRY}/${ECR_REPOSITORY}:${TAG}"
          echo "IMAGE_URI=${IMAGE_URI}" >> "$GITHUB_ENV"
          docker build --no-cache -t "${IMAGE_URI}" .
          docker push "${IMAGE_URI}"

      - name: Download current ECS task definition
        run: |
          aws ecs describe-task-definition \
            --task-definition ${{ env.ECS_TASK_DEFINITION }} \
            --query taskDefinition \
            > task-definition.json

      - name: Update image in ECS task definition
        id: task-def
        uses: aws-actions/amazon-ecs-render-task-definition@v1
        with:
          task-definition: task-definition.json
          container-name: ${{ env.CONTAINER_NAME }}
          image: ${{ env.IMAGE_URI }}
          environment-variables: |
            S3_ARTIFACTS_URI=${{ env.ARTIFACTS_URI }}
            FORCE_MODEL_DOWNLOAD=1
            ARTIFACTS_DIR=/tmp/artifacts

      - name: Deploy to ECS Fargate (Production)
        uses: aws-actions/amazon-ecs-deploy-task-definition@v2
        with:
          task-definition: ${{ steps.task-def.outputs.task-definition }}
          service: ${{ env.ECS_SERVICE }}
          cluster: ${{ env.ECS_CLUSTER }}
          wait-for-service-stability: true

      - name: Resolve deployed URL
        shell: bash
        run: |
          set -euo pipefail
          python - <<'PY'
          import boto3
          import os
          import sys

          ecs = boto3.client("ecs", region_name=os.environ["AWS_REGION"])
          elbv2 = boto3.client("elbv2", region_name=os.environ["AWS_REGION"])
          cluster = os.environ["ECS_CLUSTER"]
          service = os.environ["ECS_SERVICE"]

          resp = ecs.describe_services(cluster=cluster, services=[service])
          services = resp.get("services", [])
          if not services:
              print(f"ERROR: ECS service not found: {service}")
              sys.exit(1)

          lbs = services[0].get("loadBalancers", [])
          if not lbs:
              with open(os.environ["GITHUB_ENV"], "a") as f:
                  f.write("DEPLOYED_DNS=\n")
                  f.write("DEPLOYED_URL_STATUS=unavailable\n")
              print("WARN: ECS service has no load balancer; skipping URL-based smoke checks.")
              sys.exit(0)

          target_group_arn = lbs[0].get("targetGroupArn")
          tgs = elbv2.describe_target_groups(TargetGroupArns=[target_group_arn])["TargetGroups"]
          lb_arns = tgs[0].get("LoadBalancerArns", [])
          if not lb_arns:
              with open(os.environ["GITHUB_ENV"], "a") as f:
                  f.write("DEPLOYED_DNS=\n")
                  f.write("DEPLOYED_URL_STATUS=unavailable\n")
              print("WARN: Target group has no load balancer ARN; skipping URL-based smoke checks.")
              sys.exit(0)

          lb = elbv2.describe_load_balancers(LoadBalancerArns=[lb_arns[0]])["LoadBalancers"][0]
          dns_name = lb["DNSName"]

          with open(os.environ["GITHUB_ENV"], "a") as f:
              f.write(f"DEPLOYED_DNS={dns_name}\n")
              f.write("DEPLOYED_URL_STATUS=resolved\n")
          print(f"Resolved deployed DNS: {dns_name}")
          PY

      - name: Post-deploy smoke
        shell: bash
        run: |
          set -euo pipefail
          if [ "${DEPLOYED_URL_STATUS:-unavailable}" != "resolved" ] || [ -z "${DEPLOYED_DNS:-}" ]; then
            echo "Skipping post-deploy smoke: deployed service URL is unavailable (no load balancer attached)."
            echo "BASE_URL=unavailable" >> "$GITHUB_ENV"
            exit 0
          fi
          BASE_URL=""
          for scheme in https http; do
            candidate="${scheme}://${DEPLOYED_DNS}"
            if curl -fsS "${candidate}/health" >/tmp/health.json; then
              BASE_URL="${candidate}"
              break
            fi
          done

          if [ -z "${BASE_URL}" ]; then
            echo "ERROR: unable to reach deployed service via http/https for DNS ${DEPLOYED_DNS}"
            exit 1
          fi

          echo "BASE_URL=${BASE_URL}" >> "$GITHUB_ENV"
          echo "Using base URL: ${BASE_URL}"
          echo "Deployed URL: ${BASE_URL}"

          HTTP_CODE="$(curl -sS -o /tmp/predict.json -w "%{http_code}" \
            -X POST "${BASE_URL}/predict" \
            -H "Content-Type: application/json" \
            -d '{
              "gender":"female",
              "race_ethnicity":"group B",
              "parental_level_of_education":"bachelor'\''s degree",
              "lunch":"standard",
              "test_preparation_course":"none"
            }')"

          if [ "${HTTP_CODE}" -ne 200 ]; then
            echo "ERROR: /predict did not return 200"
            cat /tmp/predict.json
            exit 1
          fi

          python - <<'PY'
          import json
          obj = json.load(open("/tmp/predict.json"))
          assert "score_prediction" in obj, obj
          PY

      - name: Deployment complete
        run: |
          echo "Production deployment complete — ${{ env.IMAGE_URI }}"
          echo "Deployed URL: ${BASE_URL}"