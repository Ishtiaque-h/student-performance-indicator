name: Deploy to ECS Fargate (staging) - AWS

on:
  workflow_run:
    workflows: ["CI"]
    types:
      - completed
    branches:
      - aws-deployment

permissions:
  contents: read
  id-token: write   # Required for GitHub OIDC → AWS IAM role assumption

jobs:
  deploy:
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    environment: staging-aws
    runs-on: ubuntu-latest
    env:
      AWS_REGION: ${{ vars.AWS_REGION }}                         # e.g. us-east-1
      ECR_REPOSITORY: ${{ vars.ECR_REPOSITORY }}                 # e.g. student-performance
      ECS_CLUSTER: ${{ vars.ECS_CLUSTER }}                       # e.g. student-performance-cluster
      ECS_SERVICE: ${{ vars.ECS_SERVICE }}                       # e.g. student-performance-api-staging
      ECS_TASK_DEFINITION: ${{ vars.ECS_TASK_DEFINITION }}       # e.g. student-performance-staging
      CONTAINER_NAME: ${{ vars.CONTAINER_NAME }}                 # e.g. student-performance-api
      MODEL_REGISTRY_URI: ${{ vars.MODEL_REGISTRY_URI }}         # e.g. s3://your-bucket/student-performance

    steps:
      - uses: actions/checkout@v4

      # Authenticate to AWS using GitHub OIDC (no long-lived keys needed!)
      # This is the AWS equivalent of GCP Workload Identity Federation
      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_IAM_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[all]"

      # Train and publish artifacts to S3 (equivalent of GCS publish step)
      - name: Train & Publish to S3 (Staging)
        shell: bash
        run: |
          set -euo pipefail

          python scripts/train_and_publish.py \
            --registry-uri "${MODEL_REGISTRY_URI}" \
            --index-latest | tee publish.out

          RUN_URI="$(grep '^RUN_URI=' publish.out | cut -d= -f2)"
          echo "RUN_URI=${RUN_URI}" >> "$GITHUB_ENV"

      # Log in to ECR (equivalent of configuring Docker for GCP Artifact Registry)
      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      # Build and push Docker image to ECR (equivalent of pushing to GCP Artifact Registry)
      - name: Build & Push Image to ECR
        shell: bash
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
        run: |
          set -euo pipefail
          IMAGE_URI="${ECR_REGISTRY}/${ECR_REPOSITORY}:${GITHUB_SHA}"
          echo "IMAGE_URI=${IMAGE_URI}" >> "$GITHUB_ENV"
          docker build --build-arg INSTALL_EXTRAS=api,aws -t "${IMAGE_URI}" .
          docker push "${IMAGE_URI}"

      # Download and update ECS task definition with new image + env vars
      # This is the AWS equivalent of `gcloud run deploy`
      - name: Download current ECS task definition
        run: |
          aws ecs describe-task-definition \
            --task-definition ${{ env.ECS_TASK_DEFINITION }} \
            --query taskDefinition \
            > task-definition.json

      - name: Update image in ECS task definition
        id: task-def
        uses: aws-actions/amazon-ecs-render-task-definition@v1
        with:
          task-definition: task-definition.json
          container-name: ${{ env.CONTAINER_NAME }}
          image: ${{ env.IMAGE_URI }}
          environment-variables: |
            S3_ARTIFACTS_URI=${{ env.RUN_URI }}
            FORCE_MODEL_DOWNLOAD=1
            ARTIFACTS_DIR=/tmp/artifacts

      # Deploy the new task definition revision to ECS service
      - name: Deploy to ECS Fargate
        uses: aws-actions/amazon-ecs-deploy-task-definition@v2
        with:
          task-definition: ${{ steps.task-def.outputs.task-definition }}
          service: ${{ env.ECS_SERVICE }}
          cluster: ${{ env.ECS_CLUSTER }}
          wait-for-service-stability: true

      - name: Deployment complete
        run: echo "Deployed image ${{ env.IMAGE_URI }} to ECS service ${{ env.ECS_SERVICE }}"