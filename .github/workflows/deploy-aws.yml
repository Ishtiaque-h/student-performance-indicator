name: Deploy to ECS Fargate (staging) - AWS

on:
  push:
    branches:
      - "aws-deployment"    # ← triggers directly on every push to this branch
  workflow_dispatch:        # ← also allows manual trigger from Actions tab

permissions:
  contents: read
  id-token: write   # Required for GitHub OIDC → AWS IAM role assumption

jobs:
  deploy:
    environment: staging-aws
    runs-on: ubuntu-latest
    env:
      AWS_REGION: ${{ vars.AWS_REGION }}                         # e.g. us-east-1
      ECR_REPOSITORY: ${{ vars.ECR_REPOSITORY }}                 # e.g. student-performance
      ECS_CLUSTER: ${{ vars.ECS_CLUSTER }}                       # e.g. student-performance-cluster
      ECS_SERVICE: ${{ vars.ECS_SERVICE }}                       # e.g. student-performance-api-staging
      ECS_TASK_DEFINITION: ${{ vars.ECS_TASK_DEFINITION }}       # e.g. student-performance-staging
      CONTAINER_NAME: ${{ vars.CONTAINER_NAME }}                 # e.g. student-performance-api
      MODEL_REGISTRY_URI: ${{ vars.MODEL_REGISTRY_URI }}         # e.g. s3://your-bucket/student-performance

    steps:
      - uses: actions/checkout@v4

      # Authenticate to AWS using GitHub OIDC (no long-lived keys needed!)
      # This is the AWS equivalent of GCP Workload Identity Federation
      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_IAM_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[all]"

      # Train and publish artifacts to S3 (equivalent of GCS publish step)
      - name: Train & Publish to S3 (Staging)
        shell: bash
        run: |
          set -euo pipefail

          python scripts/train_and_publish.py \
            --registry-uri "${MODEL_REGISTRY_URI}" \
            --index-latest | tee publish.out

          RUN_URI="$(grep '^RUN_URI=' publish.out | cut -d= -f2)"
          echo "RUN_URI=${RUN_URI}" >> "$GITHUB_ENV"

      # Log in to ECR (equivalent of configuring Docker for GCP Artifact Registry)
      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      # Build and push Docker image to ECR (equivalent of pushing to GCP Artifact Registry)
      - name: Build & Push Image to ECR
        shell: bash
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
        run: |
          set -euo pipefail
          IMAGE_URI="${ECR_REGISTRY}/${ECR_REPOSITORY}:${GITHUB_SHA}"
          echo "IMAGE_URI=${IMAGE_URI}" >> "$GITHUB_ENV"
          docker build --build-arg INSTALL_EXTRAS=api,aws -t "${IMAGE_URI}" .
          docker push "${IMAGE_URI}"

      # Download and update ECS task definition with new image + env vars
      # This is the AWS equivalent of `gcloud run deploy`
      - name: Download current ECS task definition
        run: |
          aws ecs describe-task-definition \
            --task-definition ${{ env.ECS_TASK_DEFINITION }} \
            --query taskDefinition \
            > task-definition.json

      - name: Update image in ECS task definition
        id: task-def
        uses: aws-actions/amazon-ecs-render-task-definition@v1
        with:
          task-definition: task-definition.json
          container-name: ${{ env.CONTAINER_NAME }}
          image: ${{ env.IMAGE_URI }}
          environment-variables: |
            S3_ARTIFACTS_URI=${{ env.RUN_URI }}
            FORCE_MODEL_DOWNLOAD=1
            ARTIFACTS_DIR=/tmp/artifacts

      # Deploy the new task definition revision to ECS service
      - name: Deploy to ECS Fargate
        uses: aws-actions/amazon-ecs-deploy-task-definition@v2
        with:
          task-definition: ${{ steps.task-def.outputs.task-definition }}
          service: ${{ env.ECS_SERVICE }}
          cluster: ${{ env.ECS_CLUSTER }}
          wait-for-service-stability: true

      - name: Resolve deployed URL
        shell: bash
        run: |
          set -euo pipefail
          python - <<'PY'
          import boto3
          import os
          import sys

          ecs = boto3.client("ecs", region_name=os.environ["AWS_REGION"])
          elbv2 = boto3.client("elbv2", region_name=os.environ["AWS_REGION"])
          cluster = os.environ["ECS_CLUSTER"]
          service = os.environ["ECS_SERVICE"]

          resp = ecs.describe_services(cluster=cluster, services=[service])
          services = resp.get("services", [])
          if not services:
              print(f"ERROR: ECS service not found: {service}")
              sys.exit(1)

          lbs = services[0].get("loadBalancers", [])
          if not lbs:
              with open(os.environ["GITHUB_ENV"], "a") as f:
                  f.write("DEPLOYED_DNS=\n")
                  f.write("DEPLOYED_URL_STATUS=unavailable\n")
              print("WARN: ECS service has no load balancer; skipping URL-based smoke checks.")
              sys.exit(0)

          target_group_arn = lbs[0].get("targetGroupArn")
          tgs = elbv2.describe_target_groups(TargetGroupArns=[target_group_arn])["TargetGroups"]
          lb_arns = tgs[0].get("LoadBalancerArns", [])
          if not lb_arns:
              with open(os.environ["GITHUB_ENV"], "a") as f:
                  f.write("DEPLOYED_DNS=\n")
                  f.write("DEPLOYED_URL_STATUS=unavailable\n")
              print("WARN: Target group has no load balancer ARN; skipping URL-based smoke checks.")
              sys.exit(0)

          lb = elbv2.describe_load_balancers(LoadBalancerArns=[lb_arns[0]])["LoadBalancers"][0]
          dns_name = lb["DNSName"]

          with open(os.environ["GITHUB_ENV"], "a") as f:
              f.write(f"DEPLOYED_DNS={dns_name}\n")
              f.write("DEPLOYED_URL_STATUS=resolved\n")
          print(f"Resolved deployed DNS: {dns_name}")
          PY

      - name: Post-deploy smoke
        shell: bash
        run: |
          set -euo pipefail

          if [ "${DEPLOYED_URL_STATUS:-unavailable}" != "resolved" ] || [ -z "${DEPLOYED_DNS:-}" ]; then
            echo "Skipping post-deploy smoke: deployed service URL is unavailable (no load balancer attached)."
            echo "BASE_URL=unavailable" >> "$GITHUB_ENV"
            exit 0
          fi

          BASE_URL=""
          for scheme in https http; do
            candidate="${scheme}://${DEPLOYED_DNS}"
            if curl -fsS "${candidate}/health" >/tmp/health.json; then
              BASE_URL="${candidate}"
              break
            fi
          done

          if [ -z "${BASE_URL}" ]; then
            echo "ERROR: unable to reach deployed service via http/https for DNS ${DEPLOYED_DNS}"
            exit 1
          fi

          echo "BASE_URL=${BASE_URL}" >> "$GITHUB_ENV"
          echo "Using base URL: ${BASE_URL}"
          echo "Deployed URL: ${BASE_URL}"

          HTTP_CODE="$(curl -sS -o /tmp/predict.json -w "%{http_code}" \
            -X POST "${BASE_URL}/predict" \
            -H "Content-Type: application/json" \
            -d '{
              "gender":"female",
              "race_ethnicity":"group B",
              "parental_level_of_education":"bachelor'\''s degree",
              "lunch":"standard",
              "test_preparation_course":"none"
            }')"

          if [ "${HTTP_CODE}" -ne 200 ]; then
            echo "ERROR: /predict did not return 200"
            cat /tmp/predict.json
            exit 1
          fi

          python - <<'PY'
          import json
          obj = json.load(open("/tmp/predict.json"))
          assert "score_prediction" in obj, obj
          PY

      - name: Deployment complete
        run: |
          echo "Deployed image ${{ env.IMAGE_URI }} to ECS service ${{ env.ECS_SERVICE }}"
          echo "Deployed URL: ${BASE_URL}"