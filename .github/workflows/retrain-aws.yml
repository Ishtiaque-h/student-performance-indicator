name: Retrain and Rollout - AWS

on:
  workflow_dispatch:
  schedule:
    - cron: "0 7 * * 1"  # every Monday 07:00 UTC

permissions:
  contents: read
  id-token: write

env:
  AWS_REGION: ${{ vars.AWS_REGION }}
  MODEL_REGISTRY_URI: ${{ vars.MODEL_REGISTRY_URI }}       # s3://bucket/student-performance
  MLFLOW_S3_URI: ${{ vars.MLFLOW_S3_URI }}                # s3://bucket/mlflow/student-performance
  ARTIFACTS_DIR: /tmp/artifacts
  MLFLOW_EXPERIMENT_NAME: student-performance
  MLFLOW_DIR: /tmp/mlruns
  MLFLOW_TRACKING_URI: file:///tmp/mlruns
  PROMOTE_IF_TEST_R2_AT_LEAST: "0.10"

jobs:
  retrain:
    environment: staging-aws
    runs-on: ubuntu-latest
    env:
      ECS_CLUSTER: ${{ vars.ECS_CLUSTER }}
      ECS_SERVICE: ${{ vars.ECS_SERVICE }}
      ECS_TASK_DEFINITION: ${{ vars.ECS_TASK_DEFINITION }}
      CONTAINER_NAME: ${{ vars.CONTAINER_NAME }}

    steps:
      - uses: actions/checkout@v4

      # AWS OIDC auth — equivalent of GCP Workload Identity Federation
      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_IAM_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[all]"

      - name: Prepare run directories
        run: mkdir -p "$MLFLOW_DIR" "$ARTIFACTS_DIR"

      - name: Train + publish artifacts to S3
        id: publish
        shell: bash
        run: |
          set -euo pipefail

          python scripts/train_and_publish.py \
            --registry-uri "${MODEL_REGISTRY_URI}" \
            --index-latest | tee publish.out

          RUN_ID="$(grep '^RUN_ID=' publish.out | cut -d= -f2)"
          RUN_URI="$(grep '^RUN_URI=' publish.out | cut -d= -f2)"

          echo "RUN_ID=${RUN_ID}" >> "$GITHUB_ENV"
          echo "RUN_URI=${RUN_URI}" >> "$GITHUB_ENV"
          echo "RUN_ID=${RUN_ID}"
          echo "RUN_URI=${RUN_URI}"

      # Sync MLflow runs to S3 (equivalent of `gcloud storage rsync` to GCS)
      - name: Sync MLflow runs to S3
        run: |
          aws s3 sync "${MLFLOW_DIR}" "${MLFLOW_S3_URI}/${RUN_ID}"

      - name: Gate and promote model
        shell: bash
        run: |
          set -euo pipefail

          python - <<PY
          import json, os, sys

          report_path = os.path.join(os.environ["GITHUB_WORKSPACE"], "artifacts", "model_report.json")
          with open(report_path) as f:
              report = json.load(f)
          test_r2 = report["best_model"]["test_r2"]
          threshold = float(os.environ.get("PROMOTE_IF_TEST_R2_AT_LEAST", "0.10"))

          print(f"test_r2={test_r2}, threshold={threshold}")

          with open(os.environ["GITHUB_ENV"], "a") as f:
              f.write(f"TEST_R2={test_r2}\n")

          if test_r2 < threshold:
              print(f"Not promoting: test_r2={test_r2} < threshold={threshold}")
              sys.exit(1)
          PY

          # Write promoted URI pointer to S3 (equivalent of `gcloud storage cp` to GCS)
          python - <<PY
          import boto3, os
          uri = os.environ["MODEL_REGISTRY_URI"].rstrip("/")
          run_uri = os.environ["RUN_URI"]

          # Parse s3://bucket/prefix
          rest = uri[5:]
          bucket, _, prefix = rest.partition("/")
          key = f"{prefix}/promoted/latest_uri.txt" if prefix else "promoted/latest_uri.txt"

          boto3.client("s3").put_object(Bucket=bucket, Key=key, Body=run_uri.encode())
          print(f"Promoted model URI written to s3://{bucket}/{key}: {run_uri}")
          PY

      # Update ECS task definition with latest promoted URI and roll out to staging.
      - name: Download current ECS task definition
        run: |
          aws ecs describe-task-definition \
            --task-definition ${{ env.ECS_TASK_DEFINITION }} \
            --query taskDefinition \
            > task-definition.json

      - name: Resolve current container image
        shell: bash
        run: |
          set -euo pipefail
          CURRENT_IMAGE="$(jq -r --arg NAME "${CONTAINER_NAME}" '.containerDefinitions[] | select(.name == $NAME) | .image' task-definition.json)"
          if [ -z "${CURRENT_IMAGE}" ] || [ "${CURRENT_IMAGE}" = "null" ]; then
            echo "ERROR: Could not resolve current image for container ${CONTAINER_NAME}"
            exit 1
          fi
          echo "CURRENT_IMAGE=${CURRENT_IMAGE}" >> "$GITHUB_ENV"

      - name: Update model URI in ECS task definition
        id: task-def
        uses: aws-actions/amazon-ecs-render-task-definition@v1
        with:
          task-definition: task-definition.json
          container-name: ${{ env.CONTAINER_NAME }}
          image: ${{ env.CURRENT_IMAGE }}
          environment-variables: |
            S3_ARTIFACTS_URI=${{ env.RUN_URI }}
            FORCE_MODEL_DOWNLOAD=1
            ARTIFACTS_DIR=/tmp/artifacts

      - name: Rollout to ECS Staging
        uses: aws-actions/amazon-ecs-deploy-task-definition@v2
        with:
          task-definition: ${{ steps.task-def.outputs.task-definition }}
          service: ${{ env.ECS_SERVICE }}
          cluster: ${{ env.ECS_CLUSTER }}
          wait-for-service-stability: true

      - name: Resolve deployed URL
        shell: bash
        run: |
          set -euo pipefail
          python - <<'PY'
          import boto3
          import os
          import sys

          ecs = boto3.client("ecs", region_name=os.environ["AWS_REGION"])
          elbv2 = boto3.client("elbv2", region_name=os.environ["AWS_REGION"])
          cluster = os.environ["ECS_CLUSTER"]
          service = os.environ["ECS_SERVICE"]

          resp = ecs.describe_services(cluster=cluster, services=[service])
          services = resp.get("services", [])
          if not services:
              print(f"ERROR: ECS service not found: {service}")
              sys.exit(1)

          lbs = services[0].get("loadBalancers", [])
          if not lbs:
              with open(os.environ["GITHUB_ENV"], "a") as f:
                  f.write("DEPLOYED_DNS=\n")
                  f.write("DEPLOYED_URL_STATUS=unavailable\n")
              print("WARN: ECS service has no load balancer; skipping URL-based smoke checks.")
              sys.exit(0)

          target_group_arn = lbs[0].get("targetGroupArn")
          tgs = elbv2.describe_target_groups(TargetGroupArns=[target_group_arn])["TargetGroups"]
          lb_arns = tgs[0].get("LoadBalancerArns", [])
          if not lb_arns:
              with open(os.environ["GITHUB_ENV"], "a") as f:
                  f.write("DEPLOYED_DNS=\n")
                  f.write("DEPLOYED_URL_STATUS=unavailable\n")
              print("WARN: Target group has no load balancer ARN; skipping URL-based smoke checks.")
              sys.exit(0)

          lb = elbv2.describe_load_balancers(LoadBalancerArns=[lb_arns[0]])["LoadBalancers"][0]
          dns_name = lb["DNSName"]

          with open(os.environ["GITHUB_ENV"], "a") as f:
              f.write(f"DEPLOYED_DNS={dns_name}\n")
              f.write("DEPLOYED_URL_STATUS=resolved\n")
          print(f"Resolved deployed DNS: {dns_name}")
          PY

      - name: Post-deploy smoke
        shell: bash
        run: |
          set -euo pipefail

          if [ "${DEPLOYED_URL_STATUS:-unavailable}" != "resolved" ] || [ -z "${DEPLOYED_DNS:-}" ]; then
            echo "Skipping post-deploy smoke: deployed service URL is unavailable (no load balancer attached)."
            echo "BASE_URL=unavailable" >> "$GITHUB_ENV"
            exit 0
          fi

          BASE_URL=""
          for scheme in https http; do
            candidate="${scheme}://${DEPLOYED_DNS}"
            if curl -fsS "${candidate}/health" >/tmp/health.json; then
              BASE_URL="${candidate}"
              break
            fi
          done

          if [ -z "${BASE_URL}" ]; then
            echo "ERROR: unable to reach deployed service via http/https for DNS ${DEPLOYED_DNS}"
            exit 1
          fi

          echo "BASE_URL=${BASE_URL}" >> "$GITHUB_ENV"
          echo "Using base URL: ${BASE_URL}"
          echo "Deployed URL: ${BASE_URL}"

          HTTP_CODE="$(curl -sS -o /tmp/predict.json -w "%{http_code}" \
            -X POST "${BASE_URL}/predict" \
            -H "Content-Type: application/json" \
            -d '{
              "gender":"female",
              "race_ethnicity":"group B",
              "parental_level_of_education":"bachelor'\''s degree",
              "lunch":"standard",
              "test_preparation_course":"none"
            }')"

          if [ "${HTTP_CODE}" -ne 200 ]; then
            echo "ERROR: /predict did not return 200"
            cat /tmp/predict.json
            exit 1
          fi

          python - <<'PY'
          with open("/tmp/predict.json") as f:
              obj = json.load(f)
          obj = json.load(open("/tmp/predict.json"))
          assert "score_prediction" in obj, obj
          PY

      - name: Deployment complete
        run: 'echo "Staging deployment complete — Deployed URL: ${BASE_URL}"'